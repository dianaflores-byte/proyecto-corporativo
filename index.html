<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>esta es una pagina pequeña para ver si me amas</h1>
    <input id="repuesta" type="text" placeholder="escribe la repuesta">
    <button id="verificar">Verificar</button>
    <script>
        document.getElementById('verificar').addEventListener('click', function() {
            const respuesta = document.getElementById('repuesta').value.toLowerCase();
            if (respuesta === 'si') {
                alert('¡Me alegra saber que me amas!');
            } else {
                alert('ok');
            }
        });
    </script>
</body>
</html>
